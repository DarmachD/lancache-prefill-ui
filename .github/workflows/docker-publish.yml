name: Build and publish CacheDeck

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build --build-arg VERSION="$(tr -d '[:space:]' < VERSION)" -t cachedeck:test .

      - name: Run unit tests in image
        run: docker run --rm -v "${PWD}/tests:/app/tests:ro" cachedeck:test python -W error::ResourceWarning -m unittest discover -s tests -v

      - name: Verify embedded Steam engine
        run: docker run --rm cachedeck:test /opt/steamprefill/SteamPrefill --version

      - name: Verify relocated embedded-engine paths
        run: |
          docker run --rm \
            -e CACHEDECK_CONFIG_DIR=/tmp/cachedeck-relocation \
            -e CACHEDECK_STEAM_ENGINE_DIR=/tmp/cachedeck-relocation/steam-engine \
            cachedeck:test python -c "import app.main as m; assert m.EMBEDDED_ENGINE_BINARY == '/tmp/cachedeck-relocation/steam-engine/SteamPrefill'; assert m.PREFILL_DIR == '/tmp/cachedeck-relocation/steam-engine'; assert m.PREFILL_STATE_DIR == '/tmp/cachedeck-relocation/steam-engine/state'; assert m.PREFILL_COMMAND == '/tmp/cachedeck-relocation/steam-engine/SteamPrefill prefill'"

      - name: Smoke-test HTTP API
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name cachedeck-smoke -p 18080:8080 cachedeck:test
          trap 'docker logs cachedeck-smoke || true; docker rm -f cachedeck-smoke || true' EXIT

          health=""
          for attempt in {1..60}; do
            state="$(docker inspect --format '{{.State.Status}}' cachedeck-smoke)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' cachedeck-smoke)"

            if [[ "${state}" != "running" ]]; then
              echo "CacheDeck container stopped during startup (state=${state})." >&2
              exit 1
            fi
            if [[ "${health}" == "healthy" ]]; then
              break
            fi
            if [[ "${health}" == "unhealthy" ]]; then
              echo "CacheDeck container became unhealthy during startup." >&2
              exit 1
            fi
            sleep 1
          done

          if [[ "${health}" != "healthy" ]]; then
            echo "CacheDeck did not become healthy within 60 seconds." >&2
            exit 1
          fi

          python - <<'PY'
          import json
          import urllib.request

          def get_json(path: str) -> dict:
              with urllib.request.urlopen(
                  f"http://127.0.0.1:18080{path}", timeout=5
              ) as response:
                  assert response.status == 200
                  return json.load(response)

          health = get_json("/api/health")
          engine = get_json("/api/engine")
          schedules = get_json("/api/schedules")

          assert health["app"] == "CacheDeck"
          assert health["provider"] == "embedded-steam"
          assert health["prefill_dir"] == "/config/steam-engine"
          assert health["prefill_state_dir"] == "/config/steam-engine/state"
          assert isinstance(health["schema_version"], int)
          assert health["schema_version"] >= 1
          assert engine["provider"]["id"] == "embedded-steam"
          assert engine["provider"]["execution_mode"] == "local"
          assert engine["embedded_engine_ready"] is True
          assert engine["native_engine_ready"] is False
          assert engine["download_core"]["name"] == "SteamPrefill"
          assert engine["legacy_import_available"] is False
          assert health["embedded_engine_version"] == "3.6.0"
          assert health["docker_required"] is False
          assert engine["schema_version"] == health["schema_version"]
          assert schedules["schedules"] == []

          request = urllib.request.Request(
              "http://127.0.0.1:18080/api/schedules",
              data=json.dumps({
                  "name": "CI schedule",
                  "expression": "0 0 1 1 *",
                  "timezone": "UTC",
                  "enabled": False,
              }).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=5) as response:
              created = json.load(response)
          assert len(created["schedules"]) == 1
          schedule_id = created["schedules"][0]["schedule_id"]

          request = urllib.request.Request(
              f"http://127.0.0.1:18080/api/schedules/{schedule_id}",
              method="DELETE",
          )
          with urllib.request.urlopen(request, timeout=5) as response:
              removed = json.load(response)
          assert removed["schedules"] == []
          PY

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve application version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/darmachd/cachedeck
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.title=CacheDeck
            org.opencontainers.image.description=Structured LANCache prefill control plane
            org.opencontainers.image.vendor=Danny
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
